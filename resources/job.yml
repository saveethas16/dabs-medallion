resources:
  jobs:
    medallion_daily_job:
      name: medallion_daily_job

      tasks:
        # ── Bronze ──────────────────────────────────────────────
        - task_key: bronze_orders
          notebook_task:
            notebook_path: ../src/notebooks/bronze_orders.py
            base_parameters:
              catalog:       "${var.catalog}"
              volume_schema: "${var.volume_schema}"
              volume_name:   "${var.volume_name}"
              file_name:     "${var.file_name}"
              bronze_schema: "${var.bronze_schema}"

        # ── Silver ──────────────────────────────────────────────
        - task_key: silver_orders
          depends_on:
            - task_key: bronze_orders
          notebook_task:
            notebook_path: ../src/notebooks/silver_orders.py
            base_parameters:
              catalog:       "${var.catalog}"
              bronze_schema: "${var.bronze_schema}"
              silver_schema: "${var.silver_schema}"

        # ── Gold: Dimensions (run in parallel after silver) ─────
        - task_key: gold_dim_customer
          depends_on:
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/notebooks/gold/dim_customer.py
            base_parameters:
              catalog:       "${var.catalog}"
              silver_schema: "${var.silver_schema}"
              gold_schema:   "${var.gold_schema}"

        - task_key: gold_dim_product
          depends_on:
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/notebooks/gold/dim_product.py
            base_parameters:
              catalog:       "${var.catalog}"
              silver_schema: "${var.silver_schema}"
              gold_schema:   "${var.gold_schema}"

        - task_key: gold_dim_date
          depends_on:
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/notebooks/gold/dim_date.py
            base_parameters:
              catalog:       "${var.catalog}"
              silver_schema: "${var.silver_schema}"
              gold_schema:   "${var.gold_schema}"

        # ── Gold: Fact (runs after all dims) ────────────────────
        - task_key: gold_fact_sales
          depends_on:
            - task_key: gold_dim_customer
            - task_key: gold_dim_product
            - task_key: gold_dim_date
          notebook_task:
            notebook_path: ../src/notebooks/gold/fact_sales.py
            base_parameters:
              catalog:       "${var.catalog}"
              silver_schema: "${var.silver_schema}"
              gold_schema:   "${var.gold_schema}"

      schedule:
        quartz_cron_expression: "0 0 13 * * ?"
        timezone_id: "Asia/Kolkata"
        pause_status: "UNPAUSED"
